<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monica's Netflix</title>
    <style>
        body { background: #111; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        header { padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0)); }
        h1 { color: #e50914; margin: 0; font-size: 2.5rem; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; padding: 50px; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; transition: transform 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card:hover { transform: scale(1.08); z-index: 2; }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card-content h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .card-content p { font-size: 0.9rem; color: #aaa; line-height: 1.4; height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .btn-watch { background: #e50914; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold; margin-top: 15px; font-size: 0.9rem; }
        .btn-watch:hover { background: #ff0a16; }
        #loading { text-align: center; padding: 50px; font-size: 1.5rem; color: #888; }
    </style>
</head>
<body>
    <header>
        <h1>NETFLIX</h1>
    </header>
    
    <div id="loading">Gathering your movies...</div>
    <div id="movies" class="movie-grid"></div>

    <script>
        // Points directly to your Render backend
        const API_URL = "https://monica-netflix.onrender.com/movies";

        async function fetchMovies() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const movies = await response.json();
                const container = document.getElementById('movies');
                const loading = document.getElementById('loading');
                
                loading.style.display = 'none';
                
                container.innerHTML = movies.map(movie => `
                    <div class="card">
                        <img src="${movie.posterUrl}" alt="${movie.title}">
                        <div class="card-content">
                            <h3>${movie.title}</h3>
                            <p>${movie.description || movie.Description || "No description available."}</p>
                            
                            <a href="${movie.trailerUrl || movie.trailer}" target="_blank" class="btn-watch">
                                Watch Trailer
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('loading').innerHTML = "Unable to load movies. Check if your backend is running!";
            }
        }

        fetchMovies();
    </script>
</body>
</html>
